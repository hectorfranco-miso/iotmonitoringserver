{% extends 'base.html' %} {% load static %} {% block head %}
<script src="/static/lib/highcharts-9.1.2/highcharts.js"></script>
<script src="/static/lib/highcharts-9.1.2/modules/data.js"></script>
<script src="/static/lib/highcharts-9.1.2/modules/exporting.js"></script>
<script src="/static/lib/highcharts-9.1.2/modules/export-data.js"></script>
<script src="/static/lib/highcharts-9.1.2/modules/accessibility.js"></script>
{% endblock %} {% block content %}
<br />
<div class="container-fluid">
  <h1 class="h3 text-center">Datos históricos</h1>
  <div class="row"></div>
  <div
    class="
      historical-content
      d-flex
      align-items-center
      justify-content-center
      flex-column
    "
  >
    <img
      id="timegraph-img"
      src="/static/media/timegraph-blue.svg"
      alt="Imagen decorativa con una gráfica y un reloj"
    />
    <p>
      Descarga los datos de las estaciones
      de monitoreo.
    </p>
    <label for="daterange-btn">Selecciona un rango de fechas</label>
    <div class="mt-2 mb-2">
      <span id="daterange-label">Última semana (por defecto)</span>
      <button type="button" class="btn btn-outline-secondary btn-sm ml-2" name="daterange" id="daterange-btn">Cambiar fechas</button>
    </div>
    <div class="d-flex flex-row align-items-center">
      <a
        id="downloadAnchor"
        type="button"
        class="btn btn-primary download"
        href="#"
        data-download="datos-historicos-iot.csv"
        >Descargar datos</a
      >
      <a id="csvLink" hidden>datos-historicos-iot.csv</a>
      <div class="loader indicator" hidden></div>
    </div>
  </div>
  <style>
    .historical-content {
      width: 30%;
      margin: auto;
      min-width: 200px;
      text-align: center;
    }

    #downloadAnchor {
      margin: 24px;
    }

    #timegraph-img {
      width: 12%;
      min-width: 120px;
      height: auto;
      display: block;
      margin: auto;
      margin-top: 48px;
      margin-bottom: 24px;
    }
    .disabled {
      background-color: gray !important;
      border: gray !important;
      pointer-events: none;
    }

    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #555;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <script type="text/javascript" src="/static/lib/jquery-3.6.0.min.js"></script>
  <script type="text/javascript" src="/static/lib/moment.min.js"></script>
  <script
    type="text/javascript"
    src="/static/lib/daterangepicker.min.js"
  ></script>
  <link
    rel="stylesheet"
    type="text/css"
    href="/static/lib/daterangepicker.css"
  />
  <script type="application/javascript">
    function openCalendar() {
      $('button[name="daterange"]').click();
    }

    function setDownloadUrl(start, end) {
      var startTime = start ? +start : null;
      var endTime = end ? +end : null;
      var url = '/historic/data/';
      if (startTime != null && endTime != null) {
        url += '?from=' + startTime + '&to=' + endTime;
      }
      $("#downloadAnchor").attr("href", url).attr("data-url", url);
    }

    $(function () {
      setDownloadUrl(null, null);
      $('button[name="daterange"]').daterangepicker(
        {
          opens: "right",
          startDate: moment().subtract(6, 'days'),
          endDate: moment()
        },
        function (start, end, label) {
          $("#daterange-label").text(
            start.format("DD/MM/YYYY") + " - " + end.format("DD/MM/YYYY")
          );
          setDownloadUrl(start, end);
          $("#downloadAnchor").removeClass("disabled");
        }
      );
    });
  </script>
  <script type="application/javascript">
    $("#downloadAnchor").on("click", function (e) {
      e.preventDefault();
      var url = $(this).attr("data-url") || $(this).attr("href") || "/historic/data/";
      if ($(this).hasClass("disabled")) return;
      $(".indicator").show();
      $(".loader").attr("hidden", false);
      $(this).addClass("disabled");

      $.get(url, function (file) {
        var dataURI = "data:text/csv;charset=utf-8," + encodeURIComponent(file);
        var fname = $("#downloadAnchor").attr("data-download");
        $("#csvLink").attr({ download: fname, href: dataURI })[0].click();
        $(".indicator").hide();
        $(".loader").attr("hidden", true);
        $("#downloadAnchor").removeClass("disabled");
      }).fail(function() {
        $(".indicator").hide();
        $(".loader").attr("hidden", true);
        $("#downloadAnchor").removeClass("disabled");
        alert("Error al generar el archivo. Prueba otro rango de fechas.");
      });
    });
  </script>
</div>
{% endblock %}
